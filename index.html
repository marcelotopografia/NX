<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NX Projetos | Portal de Seleção</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="stylesheet" href="gateway.css?v=5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body class="gateway-body">
    <div class="gateway-container">
        <div class="gateway-brand fade-up">
            <h1>NX</h1>
        </div>
        
        <div class="gateway-split">
            <!-- Lado B2B -->
            <a href="corporativo.html" class="gateway-card corporate-card fade-in-left">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <ion-icon name="business-outline"></ion-icon>
                    <h2>Para Empresas e Governo</h2>
                    <p>Projetos de Infraestrutura, Terraplenagem, Pavimentação e Grandes Obras.</p>
                    <span class="btn-gateway">Acessar Setor Corporativo</span>
                </div>
            </a>
            
            <!-- Lado B2C -->
            <a href="cliente.html" class="gateway-card personal-card fade-in-right">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <ion-icon name="home-outline"></ion-icon>
                    <h2>Para Você (Pessoa Física)</h2>
                    <p>Regularização de Imóveis, Usucapião, Georreferenciamento e Topografia.</p>
                    <span class="btn-gateway">ACESSAR PESSOA FÍSICA</span>
                </div>
            </a>
        </div>
    </div>
    
    <!-- Script for animations (fade-up, etc) -->
    <script src="script.js"></script>
</body>
</html>
