<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NX Logo - Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vmin;
            height: 100vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #05070a; /* Dark blue background matching the site */
            overflow: hidden;
        }
        .logo-wrapper {
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 18px rgba(249, 115, 22, 0.5))
                   drop-shadow(0 0 40px rgba(249, 115, 22, 0.3))
                   drop-shadow(0 0 70px rgba(249, 115, 22, 0.15));
            margin-bottom: 30px;
            border-radius: 50%;
            background: #000;
            padding: 20px;
            border: 2px solid #1a2333;
        }
        .logo-wrapper img {
            width: 100%;
            height: auto;
        }
        .profile-info {
            text-align: center;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 400px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .profile-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .profile-bio {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #e0e0e0;
            margin-bottom: 15px;
            white-space: pre-line;
        }
        .profile-link {
            display: inline-block;
            color: #4da6ff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .profile-link:hover {
            text-decoration: underline;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="public/orange-nx.svg" alt="NX Logo">
        </div>
        
        <div class="profile-info">
            <div class="profile-name">NX PROJETOS | Engenharia & Regularização</div>
            <div class="profile-bio">Seu imóvel totalmente legalizado.
Especialistas em usucapião, desmembramento e topografia.
Reduza custos e elimine retrabalhos na sua obra. 👇</div>
            <a href="https://nxprojetos.com.br" class="profile-link">
                🔗 nxprojetos.com.br
            </a>
        </div>
    </div>
</body>
</html>
