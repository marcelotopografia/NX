<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NX | Projetos & Regularizações - Links</title>
    <meta name="description" content="Acesse nossos serviços para Pessoa Física, Empresas e canais de atendimento.">
    <link rel="icon" type="image/svg+xml" href="public/orange-nx.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #05070a;
            color: #fff;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-wrapper {
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 15px rgba(249, 115, 22, 0.4))
                   drop-shadow(0 0 30px rgba(249, 115, 22, 0.2));
            border-radius: 50%;
            background: #000;
            padding: 15px;
            border: 2px solid #1a2333;
            margin-bottom: 1rem;
        }

        .logo-wrapper img {
            width: 100%;
            height: auto;
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex-grow: 1;
        }

        .link-item {
            width: 100%;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 1rem 1.25rem;
            transition: all 0.2s ease;
            position: relative;
            /* Canto quadrado / sharp edge conforme solicitado */
            border-radius: 0;
        }

        .link-item:hover, .link-item:active {
            background: rgba(249, 115, 22, 0.15);
            border-color: #f97316;
            transform: translateX(4px);
        }

        .icon-wrapper {
            width: 24px;
            height: 24px;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f97316;
        }

        .icon-wrapper img, .icon-wrapper svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
            object-fit: contain;
        }

        .link-text {
            font-size: 1rem;
            font-weight: 500;
        }

        /* Destaca o link do Whatsapp */
        .link-item.highlight:hover, .link-item.highlight:active {
            background: rgba(37, 211, 102, 0.15);
            border-color: #25D366;
        }
        .link-item.highlight .icon-wrapper {
            color: #25D366;
        }
        
        /* Destaca o link do Instagram */
        .link-item.highlight-ig:hover, .link-item.highlight-ig:active {
            background: rgba(225, 48, 108, 0.15);
            border-color: #E1306C;
        }
        .link-item.highlight-ig .icon-wrapper {
            color: #E1306C;
        }

    </style>
</head>
<body>
    <div class="container">
        
        <header class="header">
            <div class="logo-wrapper">
                <img src="public/orange-nx.svg" alt="NX Logo">
            </div>
            <h1 class="brand-title">NX | Projetos & Regularizações</h1>
        </header>

        <main class="links-container">
            
            <a href="/cliente" class="link-item">
                <div class="icon-wrapper">
                    <img src="public/icon-user.svg" alt="Pessoa Física">
                </div>
                <span class="link-text">Para Pessoa Física</span>
            </a>

            <a href="/corporativo" class="link-item">
                <div class="icon-wrapper">
                    <img src="public/icon-building.svg" alt="Empresas">
                </div>
                <span class="link-text">Para Empresas</span>
            </a>

            <a href="https://wa.me/5598991424677" target="_blank" class="link-item highlight">
                <div class="icon-wrapper">
                    <img src="public/icon-whatsapp.svg" alt="WhatsApp">
                </div>
                <span class="link-text">Entre em contato conosco (Whatsapp)</span>
            </a>

            <a href="https://instagram.com/nx.projetos" target="_blank" class="link-item highlight-ig">
                <div class="icon-wrapper">
                    <img src="public/icon-instagram.svg" alt="Instagram">
                </div>
                <span class="link-text">Nos siga nas redes sociais</span>
            </a>

        </main>

    </div>
</body>
</html>
