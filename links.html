<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NX | Projetos & Regularizações - Links</title>
    <meta name="description" content="Acesse nossos serviços para Pessoa Física, Empresas e canais de atendimento.">
    <!-- Open Graph / WhatsApp / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nxprojetos.com/links">
    <meta property="og:title" content="Conheça: NX | Projetos e Regularizações">
    <meta property="og:description" content="Acesse nossos serviços para Pessoa Física, Empresas e canais de atendimento.">
    <meta property="og:image" content="https://nxprojetos.com/public/preview1x1.jpg">
    <link rel="icon" type="image/svg+xml" href="public/orange-nx.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #05070a;
            color: #fff;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            padding: 2rem 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-wrapper {
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 15px rgba(249, 115, 22, 0.4))
                   drop-shadow(0 0 30px rgba(249, 115, 22, 0.2));
            border-radius: 50%;
            background: #000;
            padding: 15px;
            border: 2px solid #1a2333;
            margin-bottom: 1rem;
        }

        .logo-wrapper img {
            width: 100%;
            height: auto;
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex-grow: 1;
        }

        .link-item {
            width: 100%;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 1.2rem 1.25rem;
            transition: all 0.2s ease;
            position: relative;
            border-radius: 0;
        }

        .link-item:hover, .link-item:active {
            background: rgba(249, 115, 22, 0.15);
            border-color: #f97316;
            transform: translateX(4px);
        }

        .icon-wrapper {
            width: 26px;
            height: 26px;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f97316;
            flex-shrink: 0;
        }

        .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .link-text {
            font-size: 1.05rem;
            font-weight: 500;
        }

        /* Social Side-by-Side container */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            width: 100%;
            margin-top: 1.5rem;
        }

        .social-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 1rem 0.5rem;
            transition: all 0.2s ease;
            text-align: center;
        }

        .social-item:hover, .social-item:active {
            transform: translateY(-3px);
        }

        .social-item .icon-wrapper {
            margin-right: 0;
            margin-bottom: 0.5rem;
            width: 28px;
            height: 28px;
        }

        .social-text {
            font-size: 0.8rem;
            font-weight: 500;
            color: #ccc;
        }

        /* Destaca o link do Whatsapp */
        .social-item.whatsapp:hover, .social-item.whatsapp:active {
            background: rgba(37, 211, 102, 0.15);
            border-color: #25D366;
        }
        
        /* Destaca o link do Instagram */
        .social-item.instagram:hover, .social-item.instagram:active {
            background: rgba(225, 48, 108, 0.15);
            border-color: #E1306C;
        }

        /* Botão de Compartilhar */
        .share-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px dashed rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 1rem;
            margin-top: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .share-btn:hover, .share-btn:active {
            background: rgba(255, 255, 255, 0.15);
            border-style: solid;
        }

        .share-btn .icon-wrapper {
            width: 20px;
            height: 20px;
            margin-right: 0.8rem;
            color: #fff;
        }

        /* Footer com frase de efeito */
        .footer-phrase {
            margin-top: auto;
            text-align: center;
            font-size: 0.85rem;
            font-style: italic;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.5px;
            padding-top: 2rem;
            line-height: 1.4;
        }

    </style>
</head>
<body>
    <div class="container">
        
        <header class="header">
            <div class="logo-wrapper">
                <img src="public/orange-nx.svg" alt="NX Logo">
            </div>
            <h1 class="brand-title">NX | Projetos & Regularizações</h1>
        </header>

        <main class="links-container">
            
            <a href="/cliente" class="link-item">
                <div class="icon-wrapper">
                    <img src="public/icon-user.svg" alt="Pessoa Física">
                </div>
                <span class="link-text">Para Pessoa Física</span>
            </a>

            <a href="/corporativo" class="link-item">
                <div class="icon-wrapper">
                    <img src="public/icon-building.svg" alt="Empresas">
                </div>
                <span class="link-text">Para Empresas</span>
            </a>

            <div class="social-grid">
                <a href="https://wa.me/5598991424677" target="_blank" class="social-item whatsapp">
                    <div class="icon-wrapper">
                        <img src="public/icon-whatsapp.svg" alt="WhatsApp">
                    </div>
                    <span class="social-text">Entre em contato</span>
                </a>

                <a href="https://instagram.com/nx.projetos" target="_blank" class="social-item instagram">
                    <div class="icon-wrapper">
                        <img src="public/icon-instagram.svg" alt="Instagram">
                    </div>
                    <span class="social-text">Siga NX no Instagram</span>
                </a>
            </div>

            <button class="share-btn" id="shareBtn">
                <div class="icon-wrapper">
                    <img src="public/icon-share.svg" alt="Compartilhar">
                </div>
                Recomendar para um amigo
            </button>

            <footer class="footer-phrase">
                "Segurança para construir. Precisão para regularizar."
            </footer>
        </main>

    </div>

    <script>
        document.getElementById('shareBtn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'NX | Projetos & Regularizações',
                        text: 'Dê uma olhada nos serviços de Engenharia e Regularização de Imóveis da NX Projetos!',
                        url: 'https://nxprojetos.com'
                    });
                } catch (err) {
                    console.log('Erro ao compartilhar:', err);
                }
            } else {
                // Fallback para caso o dispositivo não suporte (copia para a área de transferência)
                navigator.clipboard.writeText('https://nxprojetos.com');
                alert('Link copiado para a área de transferência!');
            }
        });
    </script>
</body>
</html>
